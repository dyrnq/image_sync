name: copy-sig-storage

on:
  # push:
  #   paths-ignore:
  #     - '**.md'
  #     - .github/workflows/sync.yml
  schedule:
    - cron:  '0 6 * * 2,4,6'
  workflow_dispatch:
jobs:
  generate-matrix:
    name: Generate Job Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          json="{\"images\":["
          for img in \
            "kube-state-metrics/kube-state-metrics" \
            "sig-storage/nfs-subdir-external-provisioner" \
            "sig-storage/local-volume-provisioner" \
            "sig-storage/snapshot-controller" \
            "sig-storage/csi-resizer" \
            "sig-storage/csi-provisioner" \
            "sig-storage/csi-attacher" \
            "sig-storage/csi-node-driver-registrar" \
            "sig-storage/csi-snapshotter" \
            "sig-storage/nfsplugin" \
            "sig-storage/livenessprobe" \
            "sig-storage/csi-external-health-monitor-controller" \
            "sig-storage/snapshot-validation-webhook" \
            "git-sync" ; do
            json="${json}\"${img}\","
          done
          json=${json%,}
          json="${json}]}"
          echo "matrix=${json}" >> $GITHUB_OUTPUT
      - name: Test version
        run: |
          echo ${{ steps.set-matrix.outputs.matrix }}

  build:
    runs-on: ubuntu-latest
    if: needs.generate-matrix.outputs.matrix != ''
    needs: [generate-matrix]
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.generate-matrix.outputs.matrix)}}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4

      # -
      #   name: Set up Docker Buildx
      #   id: buildx
      #   uses: docker/setup-buildx-action@v1
      # -
      #   name: Inspect builder
      #   run: |
      #     echo "Name:      ${{ steps.buildx.outputs.name }}"
      #     echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
      #     echo "Status:    ${{ steps.buildx.outputs.status }}"
      #     echo "Flags:     ${{ steps.buildx.outputs.flags }}"
      #     echo "Platforms: ${{ steps.buildx.outputs.platforms }}"
      # -
      #   name: Login to DockerHub
      #   uses: docker/login-action@v1
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Install dependencies
        run: |
          sudo apt-get -y update
          sudo apt-get -y install ca-certificates curl jq libgpgme11
          SKOPEO_VER=v1.22.0
          sudo curl -# -fSL https://github.com/dyrnq/skopeo-binary/releases/download/${SKOPEO_VER}/skopeo.tar.xz | sudo tar -xvJ -C /usr/bin
          sudo chmod +x /usr/bin/skopeo
          skopeo -v && skopeo --help
      - name: Install regctl
        run: |
          sudo curl -# -fSL -o /usr/local/bin/regctl https://github.com/regclient/regclient/releases/download/v0.11.3/regctl-linux-amd64
          sudo chmod +x /usr/local/bin/regctl
          regctl version
      - name: Images copy
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -x;
          img=${{ matrix.images }}
          src="registry.k8s.io/${img}"
          dest="docker.io/dyrnq/${img}"

          for tag in $(skopeo list-tags docker://"${src}" | jq -r '.Tags[]' | grep -P '^(latest|v.*)' | grep -v ^sha256-); do
            echo "${tag}"
            schemaVersion=$(regctl manifest get "${src}":"${tag}" --format raw-body 2>/dev/null | jq -r '.schemaVersion')
            if [ "${schemaVersion}" = "1" ]; then
              echo "schemaVersion=1, skip copy"
            else
              skopeo --insecure-policy copy --all --retry-times 20 --dest-precompute-digests --dest-creds $DOCKER_USERNAME:$DOCKER_PASSWORD docker://"${src}":"${tag}" docker://"${dest}":"${tag}"
            fi
          done

